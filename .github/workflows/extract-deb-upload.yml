name: 提取DEB + 自动解析dylib
on:
  push:
    paths:
      - "*.deb"
  workflow_dispatch:

jobs:
  extract-and-analyze:
    runs-on: ubuntu-latest
    steps:
      - name: 拉取仓库
        uses: actions/checkout@v4

      # 1. 提取 DEB 包
      - name: 提取 DEB
        run: |
          DEB_FILE=$(ls *.deb | head -1)
          mkdir -p deb_extracted
          dpkg -x "$DEB_FILE" deb_extracted/files

      # 2. 安装工具（只装 binutils 就够了）
      - name: 安装解析工具
        run: sudo apt-get update && sudo apt-get install -y binutils

      # 3. 自动解析 dylib（你要的代码信息全在这里）
      - name: 解析 BluedHook.dylib
        run: |
          DYLIB_PATH="deb_extracted/files/var/jb/Library/MobileSubstrate/DynamicLibraries/BluedHook.dylib"

          echo "========================"
          echo "📋 文件信息"
          echo "========================"
          file "$DYLIB_PATH"

          echo -e "\n========================"
          echo "🔤 可读代码/字符串（核心）"
          echo "========================"
          strings "$DYLIB_PATH"

          # 保存结果
          strings "$DYLIB_PATH" > dylib_分析结果.txt

      # 4. 上传可下载文件
      - name: 上传结果
        uses: actions/upload-artifact@v4
        with:
          name: dylib分析结果
          path: |
            dylib_分析结果.txt
            deb_extracted/
