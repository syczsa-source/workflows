name: 提取BluedHook DEB包
on:
  # 上传/更新根目录的.deb文件时，自动触发工作流
  push:
    paths:
      - "*.deb"
  # 支持手动触发（随时可手动运行，无需修改文件）
  workflow_dispatch:

jobs:
  extract_deb:
    runs-on: ubuntu-latest  # 必须使用Ubuntu环境，自带dpkg工具
    steps:
      - name: 拉取仓库文件
        uses: actions/checkout@v4

      - name: 定位并提取DEB包
        run: |
          # 自动定位仓库根目录的.deb文件（你的BluedHook-0.2.2.deb）
          DEB_FILE=$(ls *.deb | head -1)
          echo "✅ 正在处理DEB包: $DEB_FILE"

          # 创建输出目录
          mkdir -p deb_extracted

          # 核心操作：提取DEB内的所有程序/代码文件
          dpkg -x "$DEB_FILE" deb_extracted/files
          # 提取DEB控制信息（版本、依赖、安装脚本等元数据）
          dpkg -e "$DEB_FILE" deb_extracted/control

          echo "✅ DEB包提取完成！"

      - name: 上传提取结果（可下载）
        uses: actions/upload-artifact@v4
        with:
          name: BluedHook-提取结果
          path: deb_extracted/
          retention-days: 7  # 提取结果保留7天
