name: 自动提取BluedHook DEB包
on:
  # 上传/更新 .deb 文件时自动触发
  push:
    paths:
      - "*.deb"
  # 支持手动触发（兜底用）
  workflow_dispatch:

jobs:
  extract-deb:
    runs-on: ubuntu-latest
    steps:
      - name: 拉取仓库文件
        uses: actions/checkout@v4

      - name: 提取DEB包内容
        run: |
          # 自动找到根目录的BluedHook-0.2.2.deb
          DEB_FILE=$(ls *.deb | head -1)
          echo "✅ 处理DEB包: $DEB_FILE"
          
          # 创建输出目录
          mkdir -p deb_extracted
          
          # 提取程序/代码文件（核心！）
          dpkg -x "$DEB_FILE" deb_extracted/files
          # 提取版本/依赖等控制信息
          dpkg -e "$DEB_FILE" deb_extracted/control
          
          echo "✅ 提取完成！"

      - name: 上传提取结果（可下载）
        uses: actions/upload-artifact@v4
        with:
          name: BluedHook-提取结果
          path: deb_extracted/
          retention-days: 7
