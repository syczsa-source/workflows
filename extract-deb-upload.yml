name: 上传并提取 DEB 包
on:
  # 手动触发 → 支持直接上传本地 DEB 文件
  workflow_dispatch:
    inputs:
      deb_file:
        description: "上传你的 .deb 包"
        type: file  # 🔥 核心：允许上传本地文件
        required: true

jobs:
  extract:
    runs-on: ubuntu-latest
    steps:
      - name: 检出仓库
        uses: actions/checkout@v4

      - name: 获取上传的 DEB 包
        run: |
          # 自动保存上传的文件为 package.deb
          mv "${{ github.event.inputs.deb_file }}" package.deb
          echo "✅ DEB 包上传完成"

      - name: 提取 DEB 包所有内容
        run: |
          mkdir -p output
          dpkg -x package.deb output/files    # 提取程序文件
          dpkg -e package.deb output/control  # 提取版本/依赖等信息
          echo "✅ DEB 包提取完成"

      - name: 上传提取结果（可下载）
        uses: actions/upload-artifact@v4
        with:
          name: deb_extracted_result
          path: output/
          retention-days: 7  # 结果保留 7 天
